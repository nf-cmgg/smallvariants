report_comment: >
  This report has been generated by the <a href="https://github.com/nf-cmgg/smallvariants/releases/tag/1.12.0" target="_blank">nf-cmgg/smallvariants</a> analysis pipeline.
report_section_order:
  "nf-cmgg-smallvariants-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-cmgg-smallvariants-summary":
    order: -1002

export_plots: true

disable_version_detection: true

extra_fn_clean_exts:
  - type: regex_keep
    pattern: "^[^\\.]*"
    module: bcftools
  - type: regex
    pattern: "_summary_msi$"
  - type: regex
    pattern: "_all_msi$"

template: "cmgg"

mosdepth_config:
  general_stats_coverage:
    - 1
    - 5
    - 10
    - 20
    - 30
    - 40
    - 50
  include_contigs:
    - "chr*"
  exclude_contigs:
    - "*_alt"
    - "*_decoy"
    - "*_random"
    - "chrUn*"
    - "HLA*"
    - "chrM"
    - "chrEBV"

table_cond_formatting_rules:
  msiSensorPro_all_table:
    pass:
      - s_contains: "Stable"
    fail:
      - s_contains: "Unstable"
    warn:
      - s_contains: "Low-coverage"
  perc:
    pass:
      - lt: 30.0
    fail:
      - gt: 30.0
        eq: 30.0

table_cond_formatting_colours:
  - pass: "#2ecc71"
  - fail: "#e74c3c"
  - warn: "#f39c12"
  - red: "#e74c3c"
  - green: "#2ecc71"
  - gray: "#3498db"

msi_sensor_pro_coverage_threshold: 300
msi_sensor_pro_min_sites: 10
msi_high_threshold: 30

custom_plot_config:
  msi_summary:
    defaultsort:
      - column: "perc"
        direction: desc
